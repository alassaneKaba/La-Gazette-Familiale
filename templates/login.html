{% extends "base.html" %}
{% block content %}

<div class="login-page-container">

    <div class="login-hero">
        <span class="hero-emoji">👨‍👩‍👧‍👦</span>
        <h1>La Gazette Familiale</h1>
        <p>Connectez-vous pour découvrir les dernières nouvelles partagées par vos proches.</p>
    </div>

    <div class="login-card">
        <div class="card-header">
            <span class="lock-emoji">🔑</span>
            <h2>Heureux de vous revoir !</h2>
            <p>Entrez vos accès pour retrouver la tribu.</p>
        </div>

        <form method="POST" id="loginForm">
            <div class="form-group">
                <label>Adresse e-mail</label>
                <input type="email" name="email" placeholder="ex: papa@mail.com" required>
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="login-password" placeholder="••••••••" required>
                    <span class="toggle-eye" onclick="togglePassword('login-password', this)">👁️</span>
                </div>
            </div>

            <button type="submit" class="login-submit-btn">
                <span>Entrer dans la maison 🏠</span>
            </button>
        </form>

        <div class="card-footer">
            <p>Pas encore inscrit ?
                <a href="/register">Rejoindre la tribu ici</a>
            </p>
        </div>
    </div>

</div>

<style>
    .login-page-container {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
        gap: 60px;
        max-width: 1100px;
        margin: 0 auto;
        padding: 40px 20px;
    }

    /* Section Gauche (Hero) */
    .login-hero {
        flex: 1;
        min-width: 320px;
        max-width: 500px;
    }
    .hero-emoji { font-size: 60px; display: block; margin-bottom: 10px; }
    .login-hero h1 { color: #2d3748; font-size: 3.2em; margin: 0; line-height: 1.1; font-weight: 800; }
    .login-hero p { color: #718096; font-size: 1.3em; line-height: 1.5; margin-top: 20px; }

    /* Section Droite (Carte) */
    .login-card {
        flex: 1;
        min-width: 320px;
        max-width: 450px;
        background: white;
        padding: 40px;
        border-radius: 20px;
        border-top: 6px solid var(--primary);
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        text-align: center;
    }
    .lock-emoji { font-size: 50px; display: block; margin-bottom: 10px; }
    .login-card h2 { color: #2d3748; margin: 0 0 10px 0; font-size: 1.8em; }
    .login-card p { color: #718096; font-size: 0.95em; margin-bottom: 30px; }

    /* Formulaire */
    .form-group { text-align: left; margin-bottom: 20px; }
    .form-group label { font-size: 13px; color: #4a5568; font-weight: 700; margin-left: 5px; display: block; margin-bottom: 5px; }
    .form-group input {
        width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px;
        background: #f8fafc; font-size: 15px; box-sizing: border-box; transition: 0.2s;
    }
    .form-group input:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1); }

    .password-wrapper { position: relative; }
    .toggle-eye {
        position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
        cursor: pointer; font-size: 18px; color: #a0aec0; user-select: none;
    }

    .login-submit-btn {
        width: 100%; padding: 16px; background: var(--primary); color: white; border: none;
        border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer;
        transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 12px rgba(49, 130, 206, 0.3);
    }
    .login-submit-btn:hover { background: #2b6cb0; transform: translateY(-2px); }
    .login-submit-btn:active { transform: translateY(0); }

    .card-footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid #edf2f7; }
    .card-footer a { color: var(--success); text-decoration: none; font-weight: 700; }
    .card-footer a:hover { text-decoration: underline; }

    /* Mobile */
    @media (max-width: 800px) {
        .login-page-container { padding: 20px; gap: 30px; }
        .login-hero { text-align: center; }
        .login-hero h1 { font-size: 2.2em; }
        .login-hero p { font-size: 1.1em; }
        .login-card { padding: 30px 20px; }
    }
</style>

<script>
    function togglePassword(inputId, iconElement) {
        const passwordInput = document.getElementById(inputId);
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            iconElement.innerText = '🙈';
        } else {
            passwordInput.type = 'password';
            iconElement.innerText = '👁️';
        }
    }

    // Petit effet de chargement au clic
    document.getElementById('loginForm').onsubmit = function() {
        const btn = this.querySelector('.login-submit-btn');
        btn.style.opacity = '0.7';
        btn.style.pointerEvents = 'none';
        btn.innerHTML = 'Connexion en cours...';
    };
</script>
{% endblock %}
