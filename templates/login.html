{% extends "base.html" %}
{% block content %}

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); align-items: center; justify-items: center; min-height: 80vh; padding: 60px 20px; gap: 100px; max-width: 1200px; margin: 0 auto;">

    <div style="text-align: left; box-sizing: border-box; max-width: 500px;">
        <span style="font-size: 60px; display: block; margin-bottom: 10px;">👨‍👩‍👧‍👦</span>
        <h1 style="color: #2c3e50; font-size: 3.2em; margin: 0; line-height: 1.1; font-weight: 800;">La Gazette Familiale</h1>
        <p style="color: #718096; font-size: 1.4em; line-height: 1.6; margin-top: 20px;">
            Connectez-vous pour découvrir les dernières nouvelles partagées par vos proches.
        </p>
    </div>

    <div class="post-card" style="width: 100%; max-width: 450px; padding: 40px; border-top: 5px solid #3182ce; box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box; text-align: center; background: white; border-radius: 15px;">
        <div style="font-size: 50px; margin-bottom: 10px;">🔑</div>
        <h2 style="color: #2c3e50; margin-bottom: 10px; font-size: 1.8em;">Heureux de vous revoir !</h2>
        <p style="color: #7f8c8d; margin-bottom: 30px; font-size: 15px;">Entrez vos accès pour retrouver la tribu.</p>

        <form method="POST">
            <div style="margin-bottom: 20px; text-align: left;">
                <label style="font-size: 13px; color: #4a5568; font-weight: bold; margin-left: 5px;">Adresse e-mail</label>
                <input type="email" name="email" placeholder="ex: papa@mail.com" required
                       style="width: 100%; padding: 14px; margin-top: 5px; border: 1px solid #ddd; border-radius: 10px; background: #f8fafc; box-sizing: border-box; font-size: 15px;">
            </div>

            <div style="margin-bottom: 25px; text-align: left;">
                <label style="font-size: 13px; color: #4a5568; font-weight: bold; margin-left: 5px;">Mot de passe</label>
                <input type="password" name="password" placeholder="••••••••" required
                       style="width: 100%; padding: 14px; margin-top: 5px; border: 1px solid #ddd; border-radius: 10px; background: #f8fafc; box-sizing: border-box; font-size: 15px;">
            </div>

            <button type="submit" style="width: 100%; padding: 16px; background: #3182ce; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 17px; cursor: pointer;">
                Entrer dans la maison 🏠
            </button>
        </form>

        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee;">
            <p style="font-size: 14px; color: #65676b;">
                Pas encore inscrit ?
                <a href="/register" style="color: #2ecc71; text-decoration: none; font-weight: bold;">Rejoindre la tribu ici</a>
            </p>
        </div>
    </div>

</div>
{% endblock %}
